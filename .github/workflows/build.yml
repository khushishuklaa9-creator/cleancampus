name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install buildozer cython
    - name: Accept licenses
      run: |
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3" "platforms;android-29" "platform-tools"
    - name: Build APK
      run: |
        export ANDROIDSDK=/usr/local/lib/android/sdk
        export ANDROIDAPI=29
        buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: cleancampus-apk
        path: bin/*.apk
